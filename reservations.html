<!DOCTYPE HTML>
<html>
    <head>
        <link rel="stylesheet" href="styles.css"/>
        <title>Only The Bests</title>
    </head>
    <body>
        <div id="top_row">
            
            <div id="right_content">
                <header id="top_banner">
                    <a href="home.html">
                        <img id="company_logo" class="logos" src="logo.png" alt="Only the Bests"/>
                    </a>
                    Welcome to Only the Bests, where we only serve the best!
                </header>
                <ul id="main_nav">
                    <li><a href="menu_select.html">Menus</a></li>
                    <li><a href="reservations.html">Reservations</a></li>
                    <li><a href="catering_info.html">Catering</a></li>
                </ul>
            </div>
        </div>
        <div id="content">
            <form>
                <h2 style="text-decoration: underline;">Reserve a Table</h2>
                <label for="name">Name: </label>
                <input type="text" id="name"><br><br>

                <label for="guests">Party Size:</label>
                <select id="guests">
                    <option value="">Select party size</option>
                    <option value="1">1 Person</option>
                    <option value="2">2 People</option>
                    <option value="3">3 People</option>
                    <option value="4">4 People</option>
                    <option value="5">5 People</option>
                    <option value="6">6 People</option>
                    <option value="7">7 People</option>
                    <option value="8">8 People</option>
                </select><br><br>
                
                <label for="date">Reservation Date:</label>
                <input type="date" id="date" name="date"><br><br>

                <label for="time">Reservation Time:</label>
                <select id="time" name="time">
                    <option value="">Select a time</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="12:30">12:30 PM</option>
                    <option value="1:00">1:00 PM</option>
                    <option value="1:30">1:30 PM</option>
                    <option value="2:00">2:00 PM</option>
                    <option value="2:30">2:30 PM</option>
                    <option value="3:00">3:00 PM</option>
                    <option value="3:30">3:30 PM</option>
                    <option value="4:00">4:00 PM</option>
                    <option value="4:30">4:30 PM</option>
                    <option value="5:00">5:00 PM</option>
                    <option value="5:30">5:30 PM</option>
                    <option value="6:00">6:00 PM</option>
                    <option value="6:30">6:30 PM</option>
                    <option value="7:00">7:00 PM</option>
                    <option value="7:30">7:30 PM</option>
                    <option value="8:00">8:00 PM</option>
                    <option value="8:30">8:30 PM</option>
                    <option value="9:00">9:00 PM</option>
                </select><br><br>

                <input type="submit" value="Make Reservation" onclick="alert('Your table has been reserved!')">
            </form>
        </div>
    </body>
    <footer>
        Copyright 2026 OTB Inc.
    </footer>
</html>
